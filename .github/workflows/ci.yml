name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: pixellens-extension
          path: dist/
